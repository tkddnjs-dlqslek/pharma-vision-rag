services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: pharma-rag-qdrant
    restart: unless-stopped
    # Ports 6335/6336 (not the Qdrant default 6333/6334) because this host already
    # runs another Qdrant container on 6333 (n8n AI starter kit). Keep the two isolated.
    ports:
      - "6335:6333"   # HTTP REST (host:container) — access at http://localhost:6335
      - "6336:6334"   # gRPC
    volumes:
      - ./data/qdrant_storage:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO
      # QDRANT__SERVICE__API_KEY intentionally unset for local dev (no auth needed).
      # For production/cloud deployments, add QDRANT_API_KEY in .env and re-enable.

  # ─── Langfuse (self-host, optional) ─────────────────────────────────────
  # Default path: use Langfuse Cloud (set LANGFUSE_BASE_URL in .env).
  # Uncomment below to self-host instead.
  #
  # langfuse-db:
  #   image: postgres:16-alpine
  #   container_name: pharma-rag-langfuse-db
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: langfuse
  #     POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD:-langfuse}
  #     POSTGRES_DB: langfuse
  #   volumes:
  #     - ./data/langfuse_db:/var/lib/postgresql/data
  #
  # langfuse:
  #   image: langfuse/langfuse:2
  #   container_name: pharma-rag-langfuse
  #   depends_on: [langfuse-db]
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD:-langfuse}@langfuse-db:5432/langfuse
  #     NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
  #     SALT: ${LANGFUSE_SALT}
  #     NEXTAUTH_URL: http://localhost:3000
  #     TELEMETRY_ENABLED: "false"
  #     LANGFUSE_INIT_ORG_ID: pharma-rag
  #     LANGFUSE_INIT_PROJECT_ID: pharma-vision-rag

networks:
  default:
    name: pharma-rag-net
